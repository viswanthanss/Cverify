server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA — index.html must never be cached (chunk filenames change on rebuild)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Angular SPA — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy chatbot webhook to n8n container
    # Use resolver + variable so DNS is resolved at request time (not at startup)
    location /api/webhook/ {
        resolver 127.0.0.11 valid=10s;
        set $n8n_upstream http://n8n:5678;
        proxy_pass $n8n_upstream/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
